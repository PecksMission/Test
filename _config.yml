# Jekyll Configuration for GitHub Pages

title: Surgery Day Builder
description: AI-powered healthcare journey timeline creator
url: https://pecksmission.github.io
baseurl: /TEST

# Theme
theme: jekyll-theme-minimal

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files from build
exclude:
  - venv
  - env
  - .env
  - "*.pyc"
  - __pycache__
  - .pytest_cache
  - node_modules
  - Gemfile
  - Gemfile.lock
  - "*.egg-info"

# Include files
include:
  - .htaccess
