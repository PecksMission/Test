# Jekyll Configuration for GitHub Pages

title: Surgery Day Builder
description: AI-powered healthcare journey timeline creator
theme: jekyll-theme-minimal

# GitHub Pages settings
github:
  is_project_page: true
  repository_url: https://github.com/pecksmission/surgery-day-builder

# Markdown
markdown: kramdown
highlighter: rouge

# Exclude files from site build
exclude:
  - venv/
  - env/
  - .env
  - *.pyc
  - __pycache__/
  - .pytest_cache/
  - node_modules/
  - Gemfile
  - Gemfile.lock

# Include files
include:
  - .htaccess

# Build settings
plugins:
  - jekyll-seo-tag
  - jekyll-feed

# Collections (if needed)
collections:
  docs:
    output: true
    permalink: /:collection/:path/
